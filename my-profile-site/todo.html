<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 리스트</title>
    <style>
        * {
            /* 모든 요소의 기본 여백을 제거 */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            /* 앱 전체를 감싸는 흰색 박스 */
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 480px;
            padding: 32px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 28px;
            font-size: 26px;
        }

        .input-row {
            /* 입력창과 버튼을 가로로 나란히 배치 */
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            /* 입력창 클릭 시 테두리 색 변경 */
            outline: none;
            border-color: #667eea;
        }

        .input-row button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-row button:hover {
            background: #764ba2;
        }

        ul {
            list-style: none;
        }

        .todo-item {
            /* 할 일 한 줄 스타일 */
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 14px;
            background: #f7f7f7;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: transform 0.1s;
        }

        .todo-item:hover {
            transform: translateX(4px);
        }

        .todo-item.done span {
            /* 완료된 항목에 취소선 + 흐리게 */
            text-decoration: line-through;
            color: #aaa;
        }

        .todo-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .todo-item span {
            flex: 1;
            color: #333;
            font-size: 15px;
            word-break: break-all;
        }

        .del-btn {
            padding: 5px 11px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .del-btn:hover {
            background: #e63535;
        }

        .empty {
            /* 할 일이 없을 때 표시되는 안내 문구 */
            text-align: center;
            color: #bbb;
            padding: 32px 0;
            font-size: 15px;
        }

        .stats {
            /* 하단 통계 영역 */
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #eee;
        }

        .stat-num {
            font-size: 22px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 TODO 리스트</h1>

        <!-- 입력 영역 -->
        <div class="input-row">
            <input id="todoInput" type="text" placeholder="할 일을 입력하세요..." autocomplete="off">
            <button onclick="addTodo()">추가</button>
        </div>

        <!-- 할 일 목록 -->
        <ul id="todoList"></ul>

        <!-- 목록이 비었을 때 안내 메시지 -->
        <div class="empty" id="emptyMsg">할 일을 추가해보세요! ✨</div>

        <!-- 통계 -->
        <div class="stats">
            <div>
                <div class="stat-num" id="totalCount">0</div>
                <div class="stat-label">전체</div>
            </div>
            <div>
                <div class="stat-num" id="doneCount">0</div>
                <div class="stat-label">완료</div>
            </div>
        </div>
    </div>

    <script>
        // 브라우저 저장소에서 기존 데이터 불러오기
        // (새로고침해도 데이터가 유지됨)
        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // 화면에 할 일 목록을 그리는 함수
        function render() {
            const list = document.getElementById('todoList');
            const emptyMsg = document.getElementById('emptyMsg');

            // 기존 목록 초기화
            list.innerHTML = '';

            todos.forEach((todo, i) => {
                const li = document.createElement('li');
                li.className = 'todo-item' + (todo.done ? ' done' : '');

                li.innerHTML = `
                    <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggle(${i})">
                    <span>${todo.text}</span>
                    <button class="del-btn" onclick="remove(${i})">삭제</button>
                `;
                list.appendChild(li);
            });

            // 목록이 비어있으면 안내 메시지 표시
            emptyMsg.style.display = todos.length === 0 ? 'block' : 'none';

            // 통계 숫자 업데이트
            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
        }

        // 할 일 추가
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) return; // 빈 값이면 아무것도 하지 않음

            todos.push({ text, done: false });
            save();
            render();
            input.value = ''; // 입력창 비우기
            input.focus();
        }

        // 완료 상태 토글 (체크박스 클릭 시)
        function toggle(i) {
            todos[i].done = !todos[i].done;
            save();
            render();
        }

        // 할 일 삭제
        function remove(i) {
            todos.splice(i, 1); // 배열에서 i번째 항목 1개 제거
            save();
            render();
        }

        // 브라우저 저장소에 저장
        function save() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Enter 키로도 추가할 수 있게 설정
        document.getElementById('todoInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });

        // 페이지 첫 로드 시 기존 데이터 표시
        render();
    </script>
</body>
</html>
